{{- $title := .Get 0 -}}
<section class="container-full">
  {{ with $title }}
  <div class="mt-4 mb-0 p-relative ">
    <h2 class="center pt-1 pb-2 mb-0">{{ . }}</h2>
  </div>
  {{ end }}
  <div class="container--xl grid">
  {{ .Inner | markdownify }}
 </div>
</section>

<style>
  .grid {
    gap: 0 1.5em
  }
  @media screen and (min-width: 60rem) {
    .grid {
      margin: auto;
      padding-bottom: 4em;
      grid-template-columns: repeat(auto-fit, minmax(10em, 1fr));
    }
  }
</style>
