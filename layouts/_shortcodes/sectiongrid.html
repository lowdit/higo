{{- $title := .Get 0 -}}
{{- $class := .Get 1 -}}
<section class="container-full{{ with .Get 1 }} {{ . }}{{ end }}">
  {{ with $title }}
  <div class="pt-2 {{ with $class }} mt-2{{ end }} mb-0 p-relative ">
    <h2 class="center {{ with $class }} pb-2{{ end }} mb-0">{{ . }}</h2>
  </div>
  {{ end }}
  <div class="container--xl grid m-0">
  {{ .Inner | markdownify }}
 </div>
</section>

<style>
  .grid {
    gap: 0 1.5em
  }
  @media screen and (min-width: 60rem) {
    .grid {
      margin: auto;
      padding-bottom: 4em;
      grid-template-columns: repeat(auto-fit, minmax(10em, 1fr));
    }
  }
</style>
